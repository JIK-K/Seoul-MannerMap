<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서울 매너 맵</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="bg-bg text-gray-50 font-sans overflow-hidden h-screen">
    <div id="app" class="relative w-full h-screen">
      <!-- ── 구 선택 화면 ── -->
      <div
        id="gu-map-container"
        class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-gradient-to-b from-[#0d1520] to-bg transition-opacity duration-500"
      >
        <div
          class="relative z-10 text-center mb-[20px] px-[24px] animate-fadeUp"
        >
          <div
            class="live-dot inline-flex items-center bg-accent/10 border border-accent/25 text-accent font-mono text-[12px] tracking-widest px-[12px] py-[4px] rounded mb-[12px]"
          >
            SEOUL MANNER MAP v1.0
          </div>
          <h1 class="text-[36px] font-black text-white leading-tight mb-[8px]">
            어느 구를<br />살펴볼까요?
          </h1>
          <p class="text-[16px] text-muted">
            자치구를 선택하면 안전과 에티켓 정보를 확인할 수 있어요
          </p>
        </div>

        <div
          class="relative z-10 w-full px-[16px] animate-fadeUp2"
          style="height: 72vh; max-width: 960px"
        >
          <svg
            id="seoul-gu-svg"
            class="w-full h-full"
            style="cursor: grab"
          ></svg>

          <div
            id="loading-spinner"
            class="absolute inset-0 flex items-center justify-center"
          >
            <div
              class="w-[18px] h-[18px] rounded-full border-[8px] border-accent/15 border-t-accent animate-spin"
            ></div>
          </div>

          <p
            id="zoom-hint"
            class="absolute bottom-[8px] right-[8px] font-mono text-[12px] tracking-widest text-muted"
          >
            scroll to zoom
          </p>
        </div>

        <p
          class="relative z-10 font-mono text-[14px] tracking-widest text-muted mt-[12px] animate-fadeUp2"
        >
          ↑ 클릭하여 선택
        </p>
      </div>

      <!-- ── 카카오맵 화면 ── -->
      <div
        id="kakao-map-container"
        class="absolute inset-0 z-10 transition-opacity duration-500"
        style="opacity: 0; pointer-events: none"
      >
        <div id="map" class="w-full h-full"></div>

        <!-- 상단 바 -->
        <div
          id="top-bar"
          class="absolute top-0 left-0 right-0 z-20 flex items-center gap-[12px] px-[16px] py-[12px] bg-bg backdrop-blur-xl border-b border-border"
        >
          <button
            id="btn-back"
            class="flex items-center gap-[4px] cursor-pointer bg-white/[0.04] hover:bg-accent/[0.08] border border-border hover:border-accent/40 text-accent font-mono text-[12px] tracking-wider px-[12px] py-[8px] rounded-md transition-all duration-150 whitespace-nowrap"
          >
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 12H5M12 5l-7 7 7 7" />
            </svg>
            BACK
          </button>

          <div class="flex-1 text-center">
            <span
              id="selected-gu-name"
              class="font-mono text-[12px] tracking-wider text-gray-100"
              >—</span
            >
          </div>

          <div id="marker-count-wrap" class="hidden">
            <span
              class="font-mono text-[12px] tracking-widest text-muted bg-bg border border-border backdrop-blur px-[12px] py-[4px] rounded-md"
            >
              <span id="marker-count">0</span> MARKERS
            </span>
          </div>
        </div>

        <!-- 필터 버튼 -->
        <div class="absolute z-20 flex gap-[8px] top-[68px] right-[16px]">
          <div>
            <button
              id="btn-quick"
              class="flex items-center justify-center text-[20px] bg-red-500 px-[12px] py-[4px] backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-red-500/90"
              title="긴급"
            >
              긴급
            </button>
          </div>
          <div class="flex flex-col gap-[12px]">
            <button
              id="btn-smoking"
              class="filter-btn w-[44px] h-[44px] flex items-center justify-center text-[20px] bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
              title="흡연구역"
            >
              🚬
            </button>

            <button
              id="btn-toilet"
              class="filter-btn w-[44px] h-[44px] flex items-center justify-center text-[20px] bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
              title="공중화장실"
            >
              🚽
            </button>

            <button
              id="btn-fire"
              class="filter-btn w-[44px] h-[44px] flex items-center justify-center text-[20px] bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
              title="소방서·안전센터"
            >
              🚒
            </button>

            <button
              id="btn-emergency"
              class="filter-btn w-[44px] h-[44px] flex items-center justify-center text-[20px] bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
              title="응급실"
            >
              🏥
            </button>

            <button
              id="btn-bike"
              class="filter-btn w-[44px] h-[44px] flex items-center justify-center text-[20px] bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
              title="자전거 대여소"
            >
              🚴
            </button>
          </div>
        </div>

        <!-- 정보 패널 -->
        <div
          id="info-panel"
          class="absolute bottom-0 left-0 right-0 z-30 bg-bg backdrop-blur-2xl border-t border-border px-[24px] pt-[20px] pb-[32px]"
          style="
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
          "
        >
          <div
            class="w-[36px] h-[3px] bg-border rounded-full mx-auto mb-[20px]"
          ></div>

          <div class="flex justify-between items-start gap-[16px]">
            <div class="flex-1 min-w-0">
              <span
                id="place-tag"
                class="inline-block font-mono text-[0.62rem] font-bold tracking-widest px-[8px] py-[2px] rounded mb-[8px] bg-smoke/15 text-smoke border border-smoke/30"
              >
                SMOKE
              </span>
              <p
                id="place-title"
                class="text-[16px] font-black text-gray-50 leading-snug"
              ></p>
              <p
                id="place-address"
                class="font-mono text-[0.68rem] text-muted mt-[4px] leading-relaxed"
              ></p>
              <p id="place-sub" class="text-[12px] text-muted/70 mt-[4px]"></p>
            </div>

            <button
              id="close-panel"
              class="flex-shrink-0 w-[32px] h-[32px] flex items-center justify-center border border-border rounded-md text-muted cursor-pointer hover:bg-white/[0.05] hover:text-gray-200 transition-all duration-150"
            >
              <svg
                width="11"
                height="11"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <path d="M18 6L6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
