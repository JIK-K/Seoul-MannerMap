<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서울 매너 맵</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="bg-bg text-gray-50 font-sans overflow-hidden h-screen">
    <div id="app" class="relative w-full h-screen">
      <!-- ── 구 선택 화면 ── -->
      <div
        id="gu-map-container"
        class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-gradient-to-b from-[#0d1520] to-bg transition-opacity duration-500"
      >
        <div class="relative z-10 text-center mb-5 px-6 animate-fadeUp">
          <div
            class="live-dot inline-flex items-center bg-accent/10 border border-accent/25 text-accent font-mono text-[0.65rem] tracking-widest px-3 py-1 rounded mb-4"
          >
            SEOUL MANNER MAP v1.0
          </div>
          <h1 class="text-4xl font-black text-white leading-tight mb-2">
            어느 구를<br />살펴볼까요?
          </h1>
          <p class="text-sm text-muted">
            자치구를 선택하면 안전과 에티켓 정보를 확인할 수 있어요
          </p>
        </div>

        <div
          class="relative z-10 w-full px-4 animate-fadeUp2"
          style="height: 72vh; max-width: 960px"
        >
          <svg
            id="seoul-gu-svg"
            class="w-full h-full"
            style="cursor: grab"
          ></svg>

          <div
            id="loading-spinner"
            class="absolute inset-0 flex items-center justify-center"
          >
            <div
              class="w-9 h-9 rounded-full border-2 border-accent/15 border-t-accent animate-spin"
            ></div>
          </div>

          <p
            id="zoom-hint"
            class="absolute bottom-2 right-2 font-mono text-[0.65rem] tracking-widest text-muted/60"
          >
            scroll to zoom
          </p>
        </div>

        <p
          class="relative z-10 font-mono text-xs tracking-widest text-muted/60 mt-3 animate-fadeUp2"
        >
          ↑ 클릭하여 선택
        </p>
      </div>

      <!-- ── 카카오맵 화면 ── -->
      <div
        id="kakao-map-container"
        class="absolute inset-0 z-10 transition-opacity duration-500"
        style="opacity: 0; pointer-events: none"
      >
        <div id="map" class="w-full h-full"></div>

        <!-- 상단 바 -->
        <div
          id="top-bar"
          class="absolute top-0 left-0 right-0 z-20 flex items-center gap-3 px-4 py-3 bg-bg/85 backdrop-blur-xl border-b border-border"
        >
          <button
            id="btn-back"
            class="flex items-center gap-1.5 cursor-pointer bg-white/[0.04] hover:bg-accent/[0.08] border border-border hover:border-accent/40 text-accent font-mono text-[0.72rem] tracking-wider px-3.5 py-2 rounded-md transition-all duration-150 whitespace-nowrap"
          >
            <svg
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M19 12H5M12 5l-7 7 7 7" />
            </svg>
            BACK
          </button>

          <div class="flex-1 text-center">
            <span
              id="selected-gu-name"
              class="font-mono text-sm tracking-wider text-gray-100"
              >—</span
            >
          </div>

          <div id="marker-count-wrap" class="hidden">
            <span
              class="font-mono text-[0.65rem] tracking-widest text-muted bg-bg/90 border border-border backdrop-blur px-3 py-1.5 rounded-md"
            >
              <span id="marker-count">0</span> MARKERS
            </span>
          </div>
        </div>

        <!-- 필터 버튼 -->
        <div
          class="absolute z-20 flex flex-col gap-2"
          style="top: 68px; right: 16px"
        >
          <button
            id="btn-smoking"
            class="filter-btn w-11 h-11 flex items-center justify-center text-xl bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
            title="흡연구역"
          >
            🚬
          </button>

          <button
            id="btn-toilet"
            class="filter-btn w-11 h-11 flex items-center justify-center text-xl bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
            title="공중화장실"
          >
            🚽
          </button>

          <button
            id="btn-fire"
            class="filter-btn w-11 h-11 flex items-center justify-center text-xl bg-surface/90 backdrop-blur border border-border rounded-lg cursor-pointer transition-all duration-150 hover:border-white/15 hover:bg-white/[0.06]"
            title="소방서·안전센터"
          >
            🚒
          </button>
        </div>

        <!-- 정보 패널 -->
        <div
          id="info-panel"
          class="absolute bottom-0 left-0 right-0 z-30 bg-bg/[0.97] backdrop-blur-2xl border-t border-border px-6 pt-5 pb-8"
          style="
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
          "
        >
          <div class="w-9 h-[3px] bg-border rounded-full mx-auto mb-5"></div>

          <div class="flex justify-between items-start gap-4">
            <div class="flex-1 min-w-0">
              <span
                id="place-tag"
                class="inline-block font-mono text-[0.62rem] font-bold tracking-widest px-2 py-0.5 rounded mb-2 bg-smoke/15 text-smoke border border-smoke/30"
              >
                SMOKE
              </span>
              <p
                id="place-title"
                class="text-base font-black text-gray-50 leading-snug"
              ></p>
              <p
                id="place-address"
                class="font-mono text-[0.68rem] text-muted mt-1 leading-relaxed"
              ></p>
              <p id="place-sub" class="text-xs text-muted/70 mt-1"></p>
            </div>

            <button
              id="close-panel"
              class="flex-shrink-0 w-8 h-8 flex items-center justify-center border border-border rounded-md text-muted cursor-pointer hover:bg-white/[0.05] hover:text-gray-200 transition-all duration-150"
            >
              <svg
                width="11"
                height="11"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <path d="M18 6L6 18M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
